{% extends "base.html" %}
{% block title %}Nova senha — Financeiro Pessoal{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🔑</div>
      <div class="auth-title">Definir nova senha</div>
      <div class="auth-sub">Digite sua nova senha abaixo</div>
    </div>
    <div class="auth-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Nova senha</label>
          <input type="password" name="senha" class="form-input"
                 placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top:6px">
          Alterar senha →
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
