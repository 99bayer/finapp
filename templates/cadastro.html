{% extends "base.html" %}
{% block title %}Criar Conta — Financeiro Pessoal{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎉</div>
      <div class="auth-title">Criar sua conta</div>
      <div class="auth-sub">Grátis para começar · Leva menos de 1 minuto</div>
    </div>
    <div class="auth-body">
      {% if erro %}
      <div class="auth-error">⚠ {{ erro }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Seu nome</label>
          <input type="text" name="nome" class="form-input"
                 placeholder="Como prefere ser chamado" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" name="email" class="form-input"
                 placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Senha <span>mínimo 6 caracteres</span></label>
          <input type="password" name="senha" class="form-input"
                 placeholder="Crie uma senha" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:6px">
          Criar minha conta →
        </button>
      </form>
      <div class="auth-link">
        Já tem conta? <a href="/login">Entrar</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
